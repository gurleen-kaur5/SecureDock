name: SecureDock CI/CD

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  # ================================
  # Backend Checks
  # ================================
  backend-check:
    name: Backend - Lint & Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ================================
  # Frontend Build
  # ================================
  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: /api

  # ================================
  # Docker Build
  # ================================
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest

    needs:
      - backend-check
      - frontend-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend Image
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: securedock-backend:latest

      # Frontend Image
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: securedock-frontend:latest

  # ================================
  # Docker Push
  # ================================
  docker-push:
    name: Docker - Push Images
    runs-on: ubuntu-latest

    needs:
      - docker-build

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push Backend
      - name: Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            gurleennkaur5/securedock-backend:latest
            gurleennkaur5/securedock-backend:${{ github.sha }}

      # Push Frontend
      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            gurleennkaur5/securedock-frontend:latest
            gurleennkaur5/securedock-frontend:${{ github.sha }}
